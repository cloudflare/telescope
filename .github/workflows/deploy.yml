name: Deploy telescope-web production site (no-op on forks)
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'packages/telescope-web/**'
      - '.github/workflows/deploy.yml'
      - '!packages/telescope-web/.opencode/**'
      - '!packages/telescope-web/opencode.json'

jobs:
  deploy:
    if: github.repository == 'cloudflare/telescope'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/telescope-web

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/krypton'
          cache: 'npm'
          cache-dependency-path: './packages/telescope-web/package-lock.json'

      - name: install dependencies
        run: npm ci

      - name: run any new migrations
        run: npx wrangler d1 migrations apply telescope-db --remote --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: generate prisma client
        run: npx prisma generate

      - name: build astro site
        run: CLOUDFLARE_ENV=production npx astro build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: deploy to cloudflare workers
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
