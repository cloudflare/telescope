<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Static fixture — pre-rendered chart, no JS</title>
    <style>
      /* Theme-aware body background reacts to the OS colour scheme via
         media query — but deliberately does NOT communicate with the
         <waterfall-chart> component (no `data-theme` mapping, no JS).
         Use this fixture to test the chart in its un-upgraded static
         state across light/dark OS themes. */
      html,
      body {
        margin: 0;
        padding: 0;
        background: #ffffff;
        color: #111827;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #111827;
          color: #f9fafb;
        }
      }
    </style>
    <link rel="stylesheet" href="/waterfall.css" />
  </head>
  <body>
    <waterfall-chart>
      <!-- WATERFALL_CONTENT -->
    </waterfall-chart>
  </body>
</html>
